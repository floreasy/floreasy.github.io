<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<title>Pascal Antonio & Maracuja</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Anton&family=Bebas+Neue&family=Oswald:wght@400;700&family=Bricolage+Grotesque:wght@400;700&family=Instrument+Serif:ital@0;1&family=DM+Serif+Display:ital@0;1&family=Playfair+Display:ital,wght@0,400;1,400&family=Cormorant+Garamond:ital,wght@0,400;1,400&family=Inter+Tight:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="shared.css">
</head>
<body class="theme-paper">
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="tweaks-panel.jsx"></script>
  <script type="text/babel" src="tweaks.jsx"></script>
  <script type="text/babel" src="shared.jsx"></script>

  <script type="text/babel">
    function BioPage() {
      useCurtainTransitions("var(--pink)");
      useReveal();

      return (
        <>
          <SiteHeader active="bio" />

          {/* Hero with portrait */}
          <section style={{ background: "var(--pink)", borderBottom: "1.5px solid var(--ink)" }}>
            <div style={{ maxWidth: "var(--maxw)", margin: "0 auto", padding: "60px 32px", display: "grid", gridTemplateColumns: "1.4fr 1fr", gap: 40, alignItems: "end" }}>
              <div>
                <div className="eyebrow">Le conférencier</div>
                <h1 className="h-display" style={{ marginBottom: 24 }}>
                  PASCAL<br/>
                  <span style={{ background: "var(--yellow)", padding: "0 .1em" }}>ANTONIO.</span>
                </h1>
                <p className="h-serif" style={{ maxWidth: "26ch" }}>
                  <em>Consultant indépendant, formateur en éducation populaire, conférencier gesticulant.</em>
                </p>
              </div>
              <div style={{ aspectRatio: "3/4", border: "1.5px solid var(--ink)", overflow: "hidden" }}>
                <img src="assets/pascal-3.jpg" style={{ width: "100%", height: "100%", objectFit: "cover" }} alt="Portrait de Pascal Antonio"/>
              </div>
            </div>
          </section>

          {/* Bio body */}
          <section className="page reveal">
            <div className="col2">
              <div>
                <div className="eyebrow">Parcours</div>
                <h2 className="h-section">20 ans<br/>dans l'ESS<br/>et l'éducation<br/><span style={{ background: "var(--yellow)" }}>populaire.</span></h2>
              </div>
              <div className="body-l">
                <p style={{ marginBottom: 18 }}>
                  Avec plus de 20 ans d'expérience dans l'économie sociale et solidaire ainsi que dans l'éducation populaire, Pascal exerce aujourd'hui comme consultant indépendant pour le cabinet Maracuja.
                </p>
                <p style={{ marginBottom: 18 }}>
                  Il soutient les associations dans le montage de leurs projets et offre des formations sur les méthodes d'intelligence collective et les animations d'éducation populaire.
                </p>
                <p style={{ marginBottom: 18 }}>
                  Après avoir suivi une formation avec la coopérative d'éducation populaire <strong>l'Étincelle</strong> et collaboré avec <strong>Murielle Hachet</strong> sur un projet de mise en scène, Pascal propose depuis février 2025 une conférence gesticulée sur la virilité et les masculinités.
                </p>
                <p>
                  <em>Son objectif :</em> mettre toutes ses compétences au service de la lutte contre les discriminations de genre.
                </p>
              </div>
            </div>
          </section>

          {/* Photo strip */}
          <section className="page reveal">
            <div style={{ display: "grid", gridTemplateColumns: "repeat(3, 1fr)", gap: 16 }}>
              {["assets/pascal-1.jpg","assets/pascal-2.jpg","assets/pascal-4.jpg"].map((src,i)=>(
                <div key={i} style={{ aspectRatio: "4/5", overflow: "hidden", border: "1.5px solid var(--ink)" }}>
                  <img src={src} style={{ width: "100%", height: "100%", objectFit: "cover" }} alt="" />
                </div>
              ))}
            </div>
          </section>

          {/* Maracuja section */}
          <section id="maracuja" style={{ background: "var(--ink)", color: "var(--paper)", padding: "100px 32px", borderTop: "1.5px solid var(--ink)", borderBottom: "1.5px solid var(--ink)" }} className="reveal">
            <div style={{ maxWidth: "var(--maxw)", margin: "0 auto" }}>
              <div className="eyebrow" style={{ color: "var(--yellow)" }}>Le cabinet</div>
              <h2 className="h-display" style={{ marginBottom: 40 }}>
                <span style={{ color: "var(--pink)" }}>MARACUJA.</span>
              </h2>
              <div className="col2">
                <div>
                  <p className="h-serif" style={{ color: "var(--paper)" }}>
                    <em>Fondé en janvier 2023, Maracuja se spécialise dans l'Économie Sociale et Solidaire (ESS).</em>
                  </p>
                </div>
                <div className="body-l">
                  <p style={{ marginBottom: 18 }}>
                    En s'appuyant sur des méthodologies d'éducation populaire, Maracuja offre un éventail de services pour soutenir le développement des organisations associatives.
                  </p>
                  <p style={{ marginBottom: 18 }}>
                    Le cabinet propose des accompagnements personnalisés pour élaborer des stratégies de développement, ainsi que des formations axées sur la participation citoyenne et les méthodes d'intelligence collective.
                  </p>
                  <p style={{ marginBottom: 18 }}>
                    Maracuja réalise également des capitalisations et des évaluations pour aider les associations à tirer le meilleur parti de leurs projets.
                  </p>
                  <p>
                    Engagé pour l'égalité, le cabinet organise des ateliers de médiation sur l'égalité homme-femme, contribuant ainsi à un environnement plus inclusif et équitable.
                  </p>
                </div>
              </div>
              <div style={{ display: "grid", gridTemplateColumns: "repeat(4, 1fr)", gap: 0, marginTop: 60, border: "1.5px solid var(--paper)" }}>
                {[
                  ["Accompagnement", "Stratégies de développement"],
                  ["Formations", "Intelligence collective"],
                  ["Évaluations", "Capitalisation des projets"],
                  ["Médiation", "Égalité femme-homme"],
                ].map(([k,v], i) => (
                  <div key={k} style={{ padding: "24px 20px", borderRight: i < 3 ? "1.5px solid var(--paper)" : "none", minHeight: 160 }}>
                    <div className="eyebrow" style={{ color: "var(--yellow)", marginBottom: 12 }}>{k}</div>
                    <p style={{ fontFamily: "var(--font-display)", textTransform: "uppercase", fontSize: 18, lineHeight: 1.1, letterSpacing: "-.01em" }}>{v}</p>
                  </div>
                ))}
              </div>
            </div>
          </section>

          {/* Mise en scène credit */}
          <section className="page reveal" style={{ textAlign: "center", padding: "100px 32px" }}>
            <div className="eyebrow" style={{ justifyContent: "center" }}>Mise en scène</div>
            <h2 className="h-section">Murielle Hachet</h2>
            <p className="body-l" style={{ margin: "20px auto 0" }}>
              Collaboration de mise en scène pour la conférence gesticulée <em>L'imposture du Mâle-Alpha</em>.
            </p>
          </section>

          <SiteFooter />
          <PascalTweaks />
        </>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<BioPage />);
  </script>
</body>
</html>
