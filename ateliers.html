<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<title>Ateliers — L'imposture du Mâle-Alpha</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Anton&family=Bebas+Neue&family=Oswald:wght@400;700&family=Bricolage+Grotesque:wght@400;700&family=Instrument+Serif:ital@0;1&family=DM+Serif+Display:ital@0;1&family=Playfair+Display:ital,wght@0,400;1,400&family=Cormorant+Garamond:ital,wght@0,400;1,400&family=Inter+Tight:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="shared.css">
</head>
<body class="theme-yellow">
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="tweaks-panel.jsx"></script>
  <script type="text/babel" src="tweaks.jsx"></script>
  <script type="text/babel" src="shared.jsx"></script>

  <script type="text/babel">
    const ATELIERS = [
      {
        id: "atelier-1",
        n: "02",
        title: "On libère\nla parole",
        objective: "Permettre au public de s'exprimer en groupe sur le thème de l'égalité femme-homme",
        time: "1h",
        people: "10 à 40 personnes",
        material: "3 pancartes · feuilles A5 · stylos · marqueurs · feuilles de brouillon",
        bg: "var(--pink)",
        body: [
          "Cet atelier se déroule en deux phases. La première phase consiste à poser des questions en groupes de 2 ou 3 afin de recueillir des expériences à partir d'un témoignage oral.",
          "L'interview se déroule en deux temps : une première partie de 5 minutes où l'interviewé répond à une question pendant que l'intervieweur prend des notes sans l'interrompre ; une seconde partie de 5 minutes où l'intervieweur revient sur ses notes et pose des questions. Les rôles tournent ensuite afin que chaque participant puisse être interviewé.",
          "La deuxième phase est un débat structuré permettant à chacun de s'exprimer selon des règles précises. Les participants se tiennent debout au centre de l'espace de débat. L'animateur propose une affirmation et invite les participants à se positionner d'un côté ou de l'autre, soit « d'accord », soit « pas d'accord ».",
          "Le but est d'essayer de faire changer d'avis les participants en avançant des arguments convaincants. L'idée est de capturer une photographie des différents points de vue exprimés au sein du groupe. Le but n'est pas d'atteindre un consensus, mais de permettre l'expression et la reconnaissance des divers avis et positionnements.",
        ],
      },
      {
        id: "atelier-2",
        n: "03",
        title: "Radar\nintersectionnel",
        objective: "Faire réfléchir le public sur leurs postures de dominé·es et de dominant·es",
        time: "1h",
        people: "10 à 20 personnes",
        material: "1 pancarte · feuilles A5 · stylos · marqueurs · feuilles de brouillon",
        bg: "var(--paper)",
        body: [
          "Cet atelier, qui se déroule en deux phases, a pour objectif principal de rendre l'intersectionnalité accessible.",
          "Lors de la première phase, les participants partagent des anecdotes personnelles autour des thèmes suivants : identité de genre, origine géographique, orientation sexuelle, origine sociale et couleur de peau.",
          "L'animateur propose des histoires à raconter et invite les participants à en choisir une (ou deux selon le temps disponible). Ils commencent par un moment de réflexion personnelle pour sélectionner leur histoire et réfléchir aux principaux éléments qu'ils souhaitent partager.",
          "La deuxième phase invite chaque participant à se positionner sur une cible, expliquant en quoi ils se considèrent comme dominés ou dominants.",
        ],
        sidenote: {
          title: "L'intersectionnalité",
          text: "La société est structurée autour de divers rapports sociaux, tels que celui où le groupe des « riches » domine celui des « pauvres ». L'intersectionnalité combine plusieurs de ces rapports sociaux, ce qui rend les dynamiques de domination plus complexes. Une personne peut se retrouver dans une position de dominé ou de dominant selon le contexte social.",
        },
      },
      {
        id: "atelier-3",
        n: "04",
        title: "On passe\nà l'action",
        objective: "Permettre aux participant·es de trouver une action concrète réalisable",
        time: "1h",
        people: "10 à 40 personnes",
        material: "Feuilles A5 et A4 · marqueurs · stylos · post-it · gommettes · feuilles de brouillon",
        bg: "var(--ink)",
        fg: "var(--paper)",
        body: [
          "Grâce à une animation d'intelligence collective, le groupe est encouragé à identifier ensemble des actions à intégrer dans leur vie personnelle pour déconstruire le modèle patriarcal et contribuer à l'égalité entre les femmes et les hommes.",
          "Que ce soit dans le domaine de l'égalité professionnelle, des relations affectives et sexuelles, ou de la répartition de la charge mentale, cet atelier se veut pragmatique.",
          "Il incite les participants à élaborer des actions en fonction de leurs réflexions, de leurs ressources et du temps dont ils disposent.",
        ],
      },
    ];

    function AtelierBlock({ a }) {
      const dark = a.fg === "var(--paper)";
      return (
        <section id={a.id} style={{ background: a.bg, color: a.fg || "var(--ink)", padding: "100px 32px", borderTop: "1.5px solid var(--ink)" }} className="reveal">
          <div style={{ maxWidth: "var(--maxw)", margin: "0 auto" }}>
            <div style={{ display: "grid", gridTemplateColumns: "1fr 2fr", gap: 60, alignItems: "start" }}>
              <div>
                <div style={{ fontFamily: "var(--font-display)", fontSize: "clamp(80px, 14vw, 220px)", lineHeight: .85, letterSpacing: "-.04em" }}>
                  {a.n}
                </div>
                <span className="chip" style={{ background: dark ? "var(--paper)" : "var(--ink)", color: dark ? "var(--ink)" : "var(--paper)", border: "none", marginTop: 12 }}>Atelier de médiation</span>
              </div>
              <div>
                <h2 className="h-section" style={{ whiteSpace: "pre-line", marginBottom: 32 }}>{a.title}</h2>
                <p className="h-serif" style={{ marginBottom: 32 }}><em>{a.objective}.</em></p>

                <div style={{ display: "grid", gridTemplateColumns: "repeat(3, 1fr)", gap: 0, border: `1.5px solid ${dark ? "var(--paper)" : "var(--ink)"}`, marginBottom: 40 }}>
                  {[["Durée", a.time], ["Participants", a.people], ["Matériel", a.material]].map(([k,v], i) => (
                    <div key={k} style={{
                      padding: "20px 18px",
                      borderRight: i < 2 ? `1.5px solid ${dark ? "var(--paper)" : "var(--ink)"}` : "none",
                    }}>
                      <div className="eyebrow" style={{ marginBottom: 10, fontSize: 11 }}>{k}</div>
                      <div style={{ fontFamily: "var(--font-display)", textTransform: "uppercase", fontSize: 14, lineHeight: 1.2 }}>{v}</div>
                    </div>
                  ))}
                </div>

                <div style={{ display: "grid", gridTemplateColumns: a.sidenote ? "2fr 1fr" : "1fr", gap: 40 }}>
                  <div className="body-l">
                    {a.body.map((p, i) => <p key={i} style={{ marginBottom: 18 }}>{p}</p>)}
                  </div>
                  {a.sidenote && (
                    <aside style={{ padding: 24, border: "1.5px solid var(--ink)", background: "var(--yellow)", color: "var(--ink)", alignSelf: "start" }}>
                      <div className="eyebrow" style={{ marginBottom: 10 }}>Note</div>
                      <h4 style={{ fontFamily: "var(--font-display)", textTransform: "uppercase", fontSize: 22, marginBottom: 12, letterSpacing: "-.01em" }}>{a.sidenote.title}</h4>
                      <p style={{ fontFamily: "var(--font-serif)", fontStyle: "italic", fontSize: 17, lineHeight: 1.4 }}>{a.sidenote.text}</p>
                    </aside>
                  )}
                </div>
              </div>
            </div>
          </div>
        </section>
      );
    }

    function AteliersPage() {
      useCurtainTransitions("var(--yellow)");
      useReveal();

      return (
        <>
          <SiteHeader active="ateliers" />

          <section style={{ background: "var(--yellow)", padding: "80px 32px 100px", borderBottom: "1.5px solid var(--ink)" }}>
            <div style={{ maxWidth: "var(--maxw)", margin: "0 auto" }}>
              <div className="eyebrow">Mallette pédagogique</div>
              <h1 className="h-display">
                Trois ateliers<br/>
                <span style={{ fontFamily: "var(--font-serif)", fontStyle: "italic", textTransform: "none", letterSpacing: "-.02em", background: "var(--pink)", padding: "0 .12em" }}>de médiation.</span>
              </h1>
              <p className="h-serif" style={{ marginTop: 32, maxWidth: "30ch" }}>
                Considérée comme la première étape d'une démarche, "L'imposture du mâle-alpha" peut être complétée par <em>un, deux, ou trois ateliers</em> — selon les objectifs éducatifs et le budget.
              </p>
            </div>
          </section>

          {ATELIERS.map(a => <AtelierBlock key={a.id} a={a} />)}

          {/* CTA */}
          <section style={{ background: "var(--pink)", padding: "120px 32px", textAlign: "center", borderTop: "1.5px solid var(--ink)" }} className="reveal">
            <h2 className="h-display" style={{ marginBottom: 32 }}>
              Choisir<br/>votre formule.
            </h2>
            <a href="contact.html" className="btn">Programmer une intervention <span className="arrow">→</span></a>
          </section>

          <SiteFooter />
          <PascalTweaks />
        </>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<AteliersPage />);
  </script>
</body>
</html>
